app-id: uk.savagecore.ronmodmanager
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
  - org.freedesktop.Sdk.Extension.rust-stable
command: ronmodmanager
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Flatpak
build-options:
  append-path: /usr/lib/sdk/node24/bin:/usr/lib/sdk/rust-stable/bin
modules:
  - name: intltool
    buildsystem: autotools
    sources:
      - type: archive
        url: https://launchpad.net/intltool/trunk/0.51.0/+download/intltool-0.51.0.tar.gz
        sha256: 67c74d94196b153b774ab9f89b2fa6c6ba79352407037c8c14d5aeb334e959cd

  - name: libdbusmenu
    buildsystem: autotools
    build-options:
      cflags: -Wno-error
      env:
        HAVE_VALGRIND_FALSE: "#"
        HAVE_VALGRIND_TRUE: ""
    config-opts:
      - --with-gtk=3
      - --disable-dumper
      - --disable-static
      - --disable-tests
      - --disable-gtk-doc
      - --enable-introspection=no
      - --disable-vala
    sources:
      - type: archive
        url: https://launchpad.net/libdbusmenu/16.04/16.04.0/+download/libdbusmenu-16.04.0.tar.gz
        sha256: b9cc4a2acd74509435892823607d966d424bd9ad5d0b00938f27240a1bfa878a

  - name: ayatana-ido
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/ayatana-ido/archive/refs/tags/0.10.1.tar.gz
        sha256: 26187915a6f3402195e2c78d9e8a54549112a3cd05bb2fbe2059d3e78fc0e071

  - name: libayatana-indicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_VALA=NO
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-indicator/archive/refs/tags/0.9.4.tar.gz
        sha256: a18d3c682e29afd77db24366f8475b26bda22b0e16ff569a2ec71cd6eb4eac95

  - name: libayatana-appindicator
    buildsystem: cmake-ninja
    config-opts:
      - -DENABLE_BINDINGS_MONO=NO
      - -DENABLE_BINDINGS_VALA=NO
      - -DENABLE_GTKDOC=NO
    sources:
      - type: archive
        url: https://github.com/AyatanaIndicators/libayatana-appindicator/archive/refs/tags/0.5.93.tar.gz
        sha256: cbefed7a918a227bf71286246e237fcd3a9c8499b3eaac4897811a869409edf0

  - name: ronmodmanager
    buildsystem: simple
    build-commands:
      - >-
        export CARGO_HOME="$PWD/.cargo-home" &&
        export CARGO_TARGET_DIR="$PWD/src-tauri/target" &&
        npm run tauri build -- --no-bundle
      - install -Dm755 src-tauri/target/release/ronmodmanager /app/bin/ronmodmanager
      - install -Dm644 packaging/flatpak/uk.savagecore.ronmodmanager.desktop /app/share/applications/uk.savagecore.ronmodmanager.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/uk.savagecore.ronmodmanager.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/uk.savagecore.ronmodmanager.png
    sources:
      - type: dir
        path: ../../node_modules
        dest: node_modules
      - type: dir
        path: ../../src-tauri/vendor
        dest: src-tauri/vendor
      - type: file
        path: ../../src-tauri/.cargo/config.toml
        dest: src-tauri/.cargo
      - type: dir
        path: ../..
