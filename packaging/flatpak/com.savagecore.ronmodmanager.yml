app-id: com.savagecore.ronmodmanager
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
  - org.freedesktop.Sdk.Extension.rust-stable
command: ronmodmanager
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --filesystem=home
build-options:
  append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
modules:
  - name: ronmodmanager
    buildsystem: simple
    build-commands:
      - corepack enable
      - pnpm install --frozen-lockfile
      - pnpm tauri build -- --bundles none
      - install -Dm755 src-tauri/target/release/ronmodmanager /app/bin/ronmodmanager
      - install -Dm644 packaging/flatpak/com.savagecore.ronmodmanager.desktop /app/share/applications/com.savagecore.ronmodmanager.desktop
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.savagecore.ronmodmanager.png
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.savagecore.ronmodmanager.png
    sources:
      - type: dir
        path: ../..
