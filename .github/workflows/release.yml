name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release-id: ${{ steps.create.outputs.id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tmp=$(mktemp -d)
          gh release download --repo orhun/git-cliff \
            --pattern 'git-cliff-*-x86_64-unknown-linux-musl.tar.gz' \
            --dir "$tmp"
          tar xz -C "$tmp" -f "$tmp"/git-cliff-*-x86_64-unknown-linux-musl.tar.gz
          sudo install -m 755 "$(find "$tmp" -name git-cliff -type f)" /usr/local/bin/git-cliff
      - name: Generate release notes
        id: cliff
        run: |
          {
            echo "content<<EOF"
            git cliff --latest --strip all
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        id: create
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.cliff.outputs.content }}

  release:
    needs: create-release
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: npm config set script-shell bash
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release-id }}
          tauriScript: npm run tauri

  flatpak:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install git-cliff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tmp=$(mktemp -d)
          gh release download --repo orhun/git-cliff \
            --pattern 'git-cliff-*-x86_64-unknown-linux-musl.tar.gz' \
            --dir "$tmp"
          tar xz -C "$tmp" -f "$tmp"/git-cliff-*-x86_64-unknown-linux-musl.tar.gz
          sudo install -m 755 "$(find "$tmp" -name git-cliff -type f)" /usr/local/bin/git-cliff
      - name: Update AppStream releases
        run: |
          git cliff --config packaging/flatpak/cliff-appstream.toml > /tmp/appstream-releases.xml
          python3 << 'EOF'
          import re
          with open('packaging/flatpak/uk.savagecore.ronmodmanager.metainfo.xml') as f:
              content = f.read()
          with open('/tmp/appstream-releases.xml') as f:
              releases = f.read().rstrip()
          new_content = re.sub(r'  <releases>.*?  </releases>', releases, content, flags=re.DOTALL)
          with open('packaging/flatpak/uk.savagecore.ronmodmanager.metainfo.xml', 'w') as f:
              f.write(new_content)
          EOF
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cd src-tauri
          mkdir -p .cargo vendor
          cargo vendor vendor
          cat <<EOF > .cargo/config.toml
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "vendor"
          EOF
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//50 org.gnome.Sdk//50 org.freedesktop.Sdk.Extension.node24//25.08 org.freedesktop.Sdk.Extension.rust-stable//25.08
      - name: Import Flatpak GPG key
        run: |
          if [ -z "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" ]; then
            echo "::error::FLATPAK_GPG_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" | base64 -d | gpg --import
      - name: Build Flatpak
        run: |
          FLATPAK_GPG_KEY=$(gpg --list-keys --keyid-format=long --with-colons | awk -F: '/^fpr/{print $10; exit}')
          flatpak-builder --force-clean --user --install-deps-from=flathub \
            --gpg-sign=$FLATPAK_GPG_KEY \
            --repo=flatpak-repo build-dir packaging/flatpak/uk.savagecore.ronmodmanager.yml
          flatpak build-bundle \
            --gpg-sign=$FLATPAK_GPG_KEY \
            --gpg-keys=packaging/flatpak/ronmodmanager-flatpak.gpg \
            flatpak-repo ronmodmanager.flatpak uk.savagecore.ronmodmanager master
          cp packaging/flatpak/ronmodmanager-flatpak.gpg flatpak-repo/
          touch flatpak-repo/.nojekyll
      - name: Upload Flatpak bundle to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ronmodmanager.flatpak
      - name: Deploy OSTree repo to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: flatpak-repo
          clean: true
      - name: Build userscript
        run: |
          cd userscript
          npm ci
          npm run build
          cd ..
      - name: Upload userscript to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: userscript/dist/*.user.js
