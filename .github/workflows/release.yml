name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - run: npm config set script-shell bash
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: See CHANGELOG.md for details.
          tauriScript: npm run tauri

  flatpak:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          cd src-tauri
          mkdir -p .cargo vendor
          cargo vendor vendor
          cat <<EOF > .cargo/config.toml
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "vendor"
          EOF
      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.gnome.Platform//50 org.gnome.Sdk//50 org.freedesktop.Sdk.Extension.node24//25.08 org.freedesktop.Sdk.Extension.rust-stable//25.08
      - name: Import Flatpak GPG key
        run: |
          if [ -z "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" ]; then
            echo "::error::FLATPAK_GPG_PRIVATE_KEY secret is not set"
            exit 1
          fi
          echo "${{ secrets.FLATPAK_GPG_PRIVATE_KEY }}" | base64 -d | gpg --import
      - name: Build Flatpak bundle
        run: |
          FLATPAK_GPG_KEY=$(gpg --list-keys --keyid-format=long --with-colons | awk -F: '/^fpr/{print $10; exit}')
          flatpak-builder --force-clean --user --install-deps-from=flathub \
            --gpg-sign=$FLATPAK_GPG_KEY \
            --repo=flatpak-repo build-dir packaging/flatpak/uk.savagecore.ronmodmanager.yml
          flatpak build-bundle \
            --gpg-sign=$FLATPAK_GPG_KEY \
            --gpg-keys=packaging/flatpak/ronmodmanager-flatpak.gpg \
            flatpak-repo ronmodmanager.flatpak uk.savagecore.ronmodmanager master
      - name: Upload Flatpak to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          files: ronmodmanager.flatpak
